<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact // Jennaya Horne</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        form {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--bg-secondary);
            padding: 2rem;
            border: 1px solid var(--neon-cyan);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-mono);
            color: var(--neon-cyan);
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #000;
            border: 1px solid var(--text-muted);
            color: #fff;
            font-family: var(--font-sans);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: var(--glow-green);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-speed);
        }
        button:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: var(--glow-pink);
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-content">
            <div class="logo">JH//SYSTEM_V1.0</div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="projects.html">PROJECTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
            <div id="system-clock" style="font-family: var(--font-mono); color: var(--neon-cyan);">00:00:00</div>
        </div>
    </nav>

    <main class="container" style="padding-top: 4rem; text-align: center;">
        <h1 class="glitch">SECURE_UPLINK</h1>
        <p style="color: var(--text-muted);">// ESTABLISH CONNECTION</p>

        <form>
            <div class="form-group">
                <label for="name">SENDER_ID</label>
                <input type="text" id="name" placeholder="Enter name..." required>
            </div>
            <div class="form-group">
                <label for="email">UPLINK_ADDR</label>
                <input type="email" id="email" placeholder="Enter email..." required>
            </div>
            <div class="form-group">
                <label for="message">ENCRYPTED_MESSAGE</label>
                <textarea id="message" rows="5" placeholder="Transmission details..." required></textarea>
            </div>
            <button type="submit">TRANSMIT_DATA</button>
        </form>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
